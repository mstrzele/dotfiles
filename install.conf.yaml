- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - mkdir -p ~/.backup && chmod 0700 ~/.backup

- link:
    ~/.dotfiles: ''
    ~/.bash_profile:
    ~/.bashrc:
      force: true
    ~/.Brewfile:
    ~/.config/git/ignore:
      path: config/git/ignore
    ~/.config/liquidpromptrc:
      path: config/liquidpromptrc
    ~/.gitconfig:
      force: true
    ~/.irbrc:
    ~/.liquidprompt:
    ~/.tmux.conf:
    ~/.tmuxline.conf:
    ~/.zshenv:
    ~/.vimrc:
    ~/.zprezto: prezto
    ~/.zpreztorc:
    ~/.zshenv:
    ~/.zshenv.local:
    ~/.zshrc:
      force: true
    ~/.zshrc.local:
