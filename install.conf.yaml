- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - mkdir -p ~/.backup && chmod 0700 ~/.backup

- link:
    ~/.dotfiles: ''
    ~/.bash_profile: bash_profile
    ~/.bashrc:
      force: true
      path: bashrc
    ~/.Brewfile: Brewfile
    ~/.config/git/ignore:
      path: config/git/ignore
    ~/.config/liquidpromptrc:
      path: config/liquidpromptrc
    ~/.gitconfig:
      force: true
      path: gitconfig
    ~/.irbrc: irbrc
    ~/.liquidprompt: liquidprompt
    ~/.tmux.conf: tmux.conf
    ~/.tmuxline.conf: tmuxline.conf
    ~/.zshenv: zshenv
    ~/.vimrc: vimrc
    ~/.zprezto: prezto
    ~/.zpreztorc: zpreztorc
    ~/.zshenv: zshenv
    ~/.zshrc:
      force: true
      path: zshrc
