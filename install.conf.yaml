---
- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- shell:
    - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)"
    - [git submodule update --init --recursive, Installing submodules]
    - mkdir -p ~/.backup && chmod 0700 ~/.backup
    - mkdir -p ~/bin

- link:
    ~/.ansible.cfg:
    ~/.dotfiles: ''
    ~/.bash_aliases:
    ~/.bashrc:
      force: true
    ~/.Brewfile:
    ~/.config/git/ignore:
      path: config/git/ignore
    ~/.config/liquidpromptrc:
      path: config/liquidpromptrc
    ~/.gitconfig:
      force: true
    ~/.irbrc:
    ~/.liquidprompt:
    ~/.profile:
      force: true
    ~/.tmux.conf:
    ~/.tmuxline.conf:
    ~/.vimrc:
    ~/.zprezto: prezto
    ~/.zpreztorc:
    ~/.zshenv:
    ~/.zshrc:
      force: true
    ~/Makefile:
