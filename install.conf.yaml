- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - mkdir -p ~/.backup && chmod 0700 ~/.backup
  - touch ~/.zshenv.local && chmod 0600 ~/.zshenv.local
  - touch ~/.zshrc.local && chmod 0600 ~/.zshrc.local

- link:
    ~/.dotfiles: ''
    ~/.bash_aliases:
    ~/.bashrc:
      force: true
    ~/.Brewfile:
    ~/.config/git/ignore:
      path: config/git/ignore
    ~/.config/liquidpromptrc:
      path: config/liquidpromptrc
    ~/.gitconfig:
      force: true
    ~/.irbrc:
    ~/.liquidprompt:
    ~/.profile:
      force: true
    ~/.zshrc:
    ~/.tmux.conf:
    ~/.tmuxline.conf:
    ~/.zshenv:
    ~/.vimrc:
    ~/.zprezto: prezto
    ~/.zpreztorc:
    ~/.zshenv:
    ~/.zshrc:
      force: true
    ~/Makefile:
