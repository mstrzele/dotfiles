- clean: ['~']

- link:
    ~/.bash_profile: bash_profile
    ~/.Brewfile: Brewfile
    ~/.config/liquidpromptrc:
      create: true
      path: config/liquidpromptrc
    ~/.dir_colors:
      force: true
      path: dircolors-solarized/dircolors.256dark
    ~/.dotfiles: ''
    ~/.fzf: fzf
    ~/.gitconfig:
      force: true
      path: gitconfig
    ~/.gitignore: gitignore
    ~/.irbrc: irbrc
    ~/.liquidprompt: liquidprompt/
    ~/.puppet-lint.rc: puppet-lint.rc
    ~/.tmux.conf: tmux.conf
    ~/.tmuxline.conf: tmuxline.conf
    ~/.zshenv: zshenv
    ~/.vim: vim/
    ~/.vimrc: vimrc
    ~/.zprezto: prezto/
    ~/.zpreztorc: zpreztorc
    ~/.zshenv: zshenv
    ~/.zshrc:
      force: true
      path: zshrc

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - |-
      mkdir -p ~/.vim/autoload ~/.vim/bundle && \
      curl -LSso ~/.vim/autoload/pathogen.vim https://tpo.pe/pathogen.vim
  - mkdir -p ~/.backup && chmod 0700 ~/.backup
  - ~/.fzf/install --completion --key-bindings --update-rc
